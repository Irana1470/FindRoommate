server.port=8080

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/FindRoomMate?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# JWT
app.jwt.secret=RoommateAppJWTSecretKey2024VeryLongSecretKeyForSecurity
app.jwt.expiration=86400000
app.security.personal-data.secret=${app.jwt.secret}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# CCCD OCR
# Dat vie.traineddata vao backend/tessdata hoac set app.cccd.ocr.tessdata-path
app.cccd.ocr.tessdata-path=
app.cccd.ocr.primary-language=vie
app.cccd.ocr.fallback-language=

# Backward compatibility
tesseract.data.path=

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.roommate=${APP_LOG_LEVEL:INFO}
